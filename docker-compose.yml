services:
  postgres:
    image: postgres:16
    container_name: smart-notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_notes
      POSTGRES_USER: smart_notes
      POSTGRES_PASSWORD: smart_notes_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_notes -d smart_notes"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: smart-notes-backend
#    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://smart_notes:smart_notes_password@postgres:5432/smart_notes
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      ENVIRONMENT: development
      SECRET_KEY: local-dev-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres-data:
