databases:
  - name: smart-notes-db
    databaseName: smart_notes
    user: smart_notes
    plan: free

services:
  - type: web
    name: smart-notes-backend
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-notes-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://smart-notes-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://smart-notes-frontend.onrender.com

  - type: static
    name: smart-notes-frontend
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://smart-notes-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
